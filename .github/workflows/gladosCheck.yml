name: auto check

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'imgs/**'
  schedule:
    - cron: '26 19 * * *'

jobs:
  build:
    name: glados/railgun checkin
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    strategy:
      matrix:
        python-version: [3.13]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Running checkin
      run: |
        python checkin.py
      env:
        GLADOS_COOKIES: ${{ secrets.GLADOS_COOKIES }}
        GLADOS_EXCHANGE_PLAN: ${{ secrets.GLADOS_EXCHANGE_PLAN }}
        GLADOS_VERBOSE: ${{ secrets.GLADOS_VERBOSE }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 7
        keep_minimum_runs: 7
        delete_run_by_conclusion_pattern: success

    - name: Create Issue on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `⚠️ GLaDOS 签到失败 - ${new Date().toISOString().slice(0,10)}`,
            body: `本次签到失败，请查看运行日志：\n${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n可能是 Cookie 过期了，请登录 GLaDOS 重新获取 Cookie 并更新 GitHub Secrets 中的 GLADOS_COOKIES`,
          })
